<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Content Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050709; --surface: #0c1117; --card: #0f1620;
      --border: #1a2535; --border-2: #243347;
      --text: #e8edf6; --text-2: #b8c4d4; --muted: #6b7e96;
      --acc: #4fffb0; --acc-dim: rgba(79,255,176,.12); --acc-glow: rgba(79,255,176,.25);
      --acc2: #6eb5ff; --acc2-glow: rgba(110,181,255,.25);
      --danger: #ff6b7a; --danger-dim: rgba(255,107,122,.10);
      --font: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(79,255,176,.07) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(110,181,255,.05) 0%, transparent 60%);
    }
    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 28px;
    }
    .logo {
      width: 44px; height: 44px; border-radius: 14px;
      background: linear-gradient(135deg, #4fffb0, #6eb5ff);
      box-shadow: 0 0 24px rgba(79,255,176,.4);
      flex-shrink: 0; position: relative;
    }
    .logo::after {
      content: '';
      position: absolute; inset: 4px;
      background: rgba(0,0,0,.4);
      border-radius: 10px;
    }
    .brand-name {
      font-size: 22px; font-weight: 800; letter-spacing: -.5px;
      background: linear-gradient(90deg, #4fffb0, #6eb5ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .heading {
      text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 6px;
    }
    .sub {
      text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 32px;
    }
    .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label {
      font-size: 10px; color: var(--muted); font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
    }
    input {
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      border-radius: 11px; color: var(--text);
      padding: 10px 14px; font-size: 14px;
      font-family: var(--font);
      width: 100%; outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--acc-glow);
      background: rgba(79,255,176,.04);
      box-shadow: 0 0 0 3px rgba(79,255,176,.08);
    }
    .btn {
      width: 100%; padding: 11px; border-radius: 11px;
      font-size: 14px; font-weight: 700;
      font-family: var(--font);
      background: linear-gradient(135deg, rgba(79,255,176,.18), rgba(110,181,255,.12));
      color: var(--acc);
      border: 1px solid var(--acc-glow);
      cursor: pointer; margin-top: 8px;
      transition: opacity .2s, transform .1s, box-shadow .2s;
      letter-spacing: .2px;
    }
    .btn:hover {
      opacity: .9;
      box-shadow: 0 0 24px rgba(79,255,176,.18);
    }
    .btn:active { transform: scale(.98); }
    .errors {
      color: var(--danger); font-size: 12px; margin-bottom: 16px;
      background: var(--danger-dim);
      border: 1px solid rgba(255,107,122,.25);
      border-radius: 9px; padding: 10px 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .errors::before { content: '✕'; font-weight: 700; }
    .divider {
      height: 1px; background: var(--border); margin: 24px 0;
    }
    .footer {
      text-align: center; font-size: 12px; color: var(--muted); margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo-wrap">
        <div class="logo"></div>
        <span class="brand-name">Content Dashboard</span>
      </div>

      <p class="heading">Welcome back</p>
      <p class="sub">Sign in to access the daily tracker</p>

      {% if form.errors %}
        <div class="errors">Invalid username or password</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="row">
          <label>Username</label>
          <input type="text" name="username" autofocus autocomplete="username" placeholder="your username">
        </div>
        <div class="row">
          <label>Password</label>
          <input type="password" name="password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="btn" type="submit">Sign in →</button>
      </form>
    </div>
    <p class="footer">Content Dashboard</p>
  </div>
</body>
</html>
