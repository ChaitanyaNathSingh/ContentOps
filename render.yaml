databases:
  - name: contentdashboarddb
    plan: free
    databaseName: contentdashboard
    user: contentdashboard

services:
  - type: web
    plan: free
    name: contentdashboard
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn contentdashboard.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contentdashboarddb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4