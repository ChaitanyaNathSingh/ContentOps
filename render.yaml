databases:
  - name: contentdashboarddb
    plan: free
    databaseName: contentdashboard
    user: contentdashboard

services:
  - type: web
    plan: free
    name: contentdashboard
    runtime: python
    rootDir: backend
    buildCommand: './build.sh'
    startCommand: 'gunicorn contentops.wsgi:application'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contentdashboarddb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4